<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kicks AR - Virtual Try-On</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        video, canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .brand-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10; color: white;
            background: rgba(0, 0, 0, 0.7); padding: 15px 25px; border-radius: 10px;
            border: 1px solid #333; backdrop-filter: blur(5px);
        }
        .brand-ui h1 { margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .status { font-size: 12px; color: #ffaa00; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="ar-canvas"></canvas>
    </div>

    <div class="brand-ui">
        <h1>KICKS AR</h1>
        <div class="status">● Initializing 3D Engine...</div>
    </div>

    <script>
        let scene, camera, renderer, shoeModel;
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('ar-canvas');

        // 1. Camera Access Setup
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                return new Promise((resolve) => video.onloadedmetadata = () => resolve());
            } catch (err) {
                console.error("Camera error:", err);
                document.querySelector('.status').innerText = '❌ Camera Access Denied';
                document.querySelector('.status').style.color = '#ff0033';
            }
        }

        // 2. Three.js 3D Engine Setup
        function init3DEngine() {
            scene = new THREE.Scene();
            
            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            // Bright Lighting Setup taake model dark na lage
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); // Full soft light
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.5); // Strong key light
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.5); // Soft shadow fill
            fillLight.position.set(-5, -5, 2);
            scene.add(fillLight);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // 3. Loading your "Sneakers.glb" file
            document.querySelector('.status').innerText = '● Loading Sneakers.glb...';
            
            const loader = new THREE.GLTFLoader();
            loader.load('https://raw.githubusercontent.com/umarsajjad1212/T2/main/Sneakers.glb', function(gltf) {
                shoeModel = gltf.scene;
                
                // Scale aur Position defaults (testing ke liye center mein rkh rhe hain)
                shoeModel.scale.set(1.5, 1.5, 1.5); 
                shoeModel.position.set(0, 0, 0);   
                
                scene.add(shoeModel);
                
                // Status Update
                const statusElement = document.querySelector('.status');
                statusElement.innerText = '● AR Engine Ready';
                statusElement.style.color = '#00ff88';
                
            }, function(xhr) {
                // Loading progress track karne ke liye console mein
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            }, function(error) {
                console.error('GLB Load Error:', error);
                document.querySelector('.status').innerText = '❌ Model Load Failed (Check file name)';
                document.querySelector('.status').style.color = '#ff0033';
            });

            animate();
        }

        // 4. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Agar model load ho jaye toh use slow-motion mein ghumao testing ke liye
            if(shoeModel) {
                shoeModel.rotation.y += 0.01;
            }
            
            renderer.render(scene, camera);
        }

        // Start everything
        async function start() {
            await setupCamera();
            init3DEngine();
        }

        window.addEventListener('DOMContentLoaded', start);

        // Resize Fix
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
